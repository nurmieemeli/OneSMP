# Configurable EXTRA aliases for individual subcommands, e.g. "/world tp" also answering to
# "/world teleport". Each subcommand's own name (the key) always works no matter what's listed
# here. Unlike aliases.yml, these aren't registered as real Bukkit commands - they're just extra
# labels checked in code before dispatching. Add/remove/edit freely; changes take effect on next
# server restart.
world:
  create: [c]
  list: [ls]
  delete: [d, del]
  teleport: [tp]
guild:
  create: []
  disband: []
  invite: [inv]
  accept: [a]
  kick: []
  promote: []
  demote: []
  sethome: []
  home: [h]
  info: [i]
  list: [ls]
  chat: [c]
  leave: []
  gui: [menu]
eco:
  give: []
  take: []
  set: []