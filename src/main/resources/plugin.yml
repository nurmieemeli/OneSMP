name: CanvasSuite
version: ${project.version}
main: gg.nurmi.CanvasSuitePlugin
api-version: 1.21
folia-supported: true
description: ${project.description}

depend: [MiniPlaceholders]
softdepend: [Vault, PacketEvents, LuckPerms, FancyHolograms]

commands:
  balance:
    description: Check your or another player's balance.
    usage: /balance [player]
  pay:
    description: Pay another player from your balance.
    usage: /pay <player> <amount>
  baltop:
    description: View the richest players.
    usage: /baltop [page]
  eco:
    description: Administrate the economy.
    usage: /eco <give|take|set> <player> <amount>
  buy:
    description: Open the server shop.
    usage: /buy
  sell:
    description: Sell items from your inventory.
    usage: /sell
  crate:
    description: Manage crates (admin) - keys are used automatically by right-clicking a bound crate block.
    usage: /crate <create|remove|key> ...
  sethome:
    description: Set a home at your current location.
    usage: /sethome [name]
  home:
    description: Teleport to a home, or list your homes.
    usage: /home [name]
  delhome:
    description: Delete one of your homes.
    usage: /delhome <name>
  setwarp:
    description: Create a server warp at your current location.
    usage: /setwarp <name>
  warp:
    description: Teleport to a warp, or list warps.
    usage: /warp [name]
  delwarp:
    description: Delete a server warp.
    usage: /delwarp <name>
  tpa:
    description: Request to teleport to a player.
    usage: /tpa <player>
  tpahere:
    description: Request that a player teleports to you.
    usage: /tpahere <player>
  tpaccept:
    description: Accept an incoming teleport request.
    usage: /tpaccept
  tpdeny:
    description: Deny an incoming teleport request.
    usage: /tpdeny
  rtp:
    description: Randomly teleport within the world border.
    usage: /rtp [world]
  guild:
    description: Manage your guild.
    usage: /guild <create|disband|invite|accept|kick|promote|demote|sethome|home|info|list|chat|leave|gui>
  setspawn:
    description: Set the server spawn point at your current location.
    usage: /setspawn
  spawn:
    description: Teleport to the server spawn.
    usage: /spawn
  spectate:
    description: Toggle moderator spectate/vanish mode on a target player.
    usage: /spectate [player]
  world:
    description: Create and manage worlds.
    usage: /world <create|list|delete|teleport> ...
  msg:
    description: Send a private message to another player.
    usage: /msg <player> <message>
  reply:
    description: Reply to the last player who messaged you.
    usage: /reply <message>
  ignore:
    description: Toggle ignoring private messages from a player.
    usage: /ignore <player>
  socialspy:
    description: Toggle mirroring everyone's private messages to yourself.
    usage: /socialspy
  stats:
    description: View your or another player's kill/death/killstreak/playtime stats.
    usage: /stats [player]
  statstop:
    description: View the leaderboard for kills, deaths, killstreak, or playtime.
    usage: /statstop <kills|deaths|killstreak|playtime>
  statshologram:
    description: Create, remove, or list leaderboard holograms (requires FancyHolograms).
    usage: /statshologram <create|remove|list> ...

permissions:
  canvassuite.admin:
    description: Grants all CanvasSuite admin permissions.
    default: op
    children:
      canvassuite.economy.admin: true
      canvassuite.warp.admin: true
      canvassuite.guild.admin: true
      canvassuite.rtp.admin: true
      canvassuite.spawn.admin: true
      canvassuite.world.admin: true
      canvassuite.msg.socialspy: true
      canvassuite.crate.admin: true
  canvassuite.economy.use: { default: true }
  canvassuite.economy.admin: { default: op }
  canvassuite.shop.use: { default: true }
  canvassuite.shop.sell: { default: true }
  canvassuite.crate.use: { default: true }
  canvassuite.crate.admin: { default: op }
  canvassuite.home.use: { default: true }
  canvassuite.home.unlimited: { default: false }
  canvassuite.warp.use: { default: true }
  canvassuite.warp.admin: { default: op }
  canvassuite.tpa.use: { default: true }
  canvassuite.rtp.use: { default: true }
  canvassuite.rtp.admin: { default: op }
  canvassuite.guild.use: { default: true }
  canvassuite.guild.admin: { default: op }
  canvassuite.chat.format: { default: false }
  canvassuite.spawn.use: { default: true }
  canvassuite.spawn.admin: { default: op }
  canvassuite.moderation.spectate: { default: op }
  canvassuite.world.admin: { default: op }
  canvassuite.msg.use: { default: true }
  canvassuite.msg.socialspy: { default: op }
  canvassuite.stats.use: { default: true }
  canvassuite.stats.hologram.admin: { default: op }
