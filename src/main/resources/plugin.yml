name: OneSMP
version: ${project.version}
main: gg.nurmi.OneSMPPlugin
api-version: 1.21
folia-supported: true
description: ${project.description}

depend: [MiniPlaceholders]
softdepend: [Vault, PacketEvents, LuckPerms, FancyHolograms]

commands:
  onesmp:
    description: Reload OneSMP's config files without restarting.
    usage: /onesmp <reload>
  balance:
    description: Check your or another player's balance.
    usage: /balance [player]
  pay:
    description: Pay another player from your balance.
    usage: /pay <player> <amount>
  baltop:
    description: View the richest players.
    usage: /baltop [page]
  eco:
    description: Administrate the economy.
    usage: /eco <give|take|set> <player> <amount>
  sell:
    description: Sell items from your inventory.
    usage: /sell
  market:
    description: Browse, search, buy, and list player-sold items on the market.
    usage: /market [sell <price>|search <query>|mine|cancel <id>]
  crate:
    description: Manage crates (admin) - keys are used automatically by right-clicking a bound crate block.
    usage: /crate <create|remove|key> ...
  sethome:
    description: Set a home at your current location.
    usage: /sethome [name]
  home:
    description: Teleport to a home, or list your homes.
    usage: /home [name]
  delhome:
    description: Delete one of your homes.
    usage: /delhome <name>
  setwarp:
    description: Create a server warp at your current location.
    usage: /setwarp <name>
  warp:
    description: Teleport to a warp, or list warps.
    usage: /warp [name]
  delwarp:
    description: Delete a server warp.
    usage: /delwarp <name>
  tpa:
    description: Request to teleport to a player.
    usage: /tpa <player>
  tpahere:
    description: Request that a player teleports to you.
    usage: /tpahere <player>
  tpaccept:
    description: Accept an incoming teleport request.
    usage: /tpaccept
  tpdeny:
    description: Deny an incoming teleport request.
    usage: /tpdeny
  rtp:
    description: Randomly teleport within the world border.
    usage: /rtp [world]
  guild:
    description: Manage your guild.
    usage: /guild <create|disband|invite|accept|kick|promote|demote|sethome|home|info|list|chat|leave|gui>
  setspawn:
    description: Set the server spawn point at your current location.
    usage: /setspawn
  spawn:
    description: Teleport to the server spawn.
    usage: /spawn
  spectate:
    description: Toggle moderator spectate/vanish mode on a target player.
    usage: /spectate [player]
  maintenance:
    description: Toggle maintenance mode, backed by the server's whitelist.
    usage: /maintenance <on|off|status>
  world:
    description: Create and manage worlds.
    usage: /world <create|list|delete|teleport> ...
  msg:
    description: Send a private message to another player.
    usage: /msg <player> <message>
  reply:
    description: Reply to the last player who messaged you.
    usage: /reply <message>
  ignore:
    description: Toggle ignoring private messages from a player.
    usage: /ignore <player>
  socialspy:
    description: Toggle mirroring everyone's private messages to yourself.
    usage: /socialspy
  stats:
    description: View your or another player's kill/death/killstreak/playtime stats.
    usage: /stats [player]
  statstop:
    description: View the leaderboard for kills, deaths, killstreak, playtime, or K/D.
    usage: /statstop <kills|deaths|killstreak|playtime|kd>
  statshologram:
    description: Create, remove, or list leaderboard holograms (requires FancyHolograms).
    usage: /statshologram <create|remove|list> ...
  help:
    description: Browse server help articles, organized into categories.
    usage: /help [category] [article]
  discord:
    description: Get a link to the server's Discord.
    usage: /discord
  store:
    description: Get a link to the server's store.
    usage: /store

permissions:
  onesmp.admin:
    description: Grants all OneSMP admin permissions.
    default: op
    children:
      onesmp.economy.admin: true
      onesmp.warp.admin: true
      onesmp.guild.admin: true
      onesmp.rtp.admin: true
      onesmp.spawn.admin: true
      onesmp.world.admin: true
      onesmp.msg.socialspy: true
      onesmp.crate.admin: true
      onesmp.maintenance.admin: true
  onesmp.economy.use: { default: true }
  onesmp.economy.admin: { default: op }
  onesmp.shop.sell: { default: true }
  onesmp.market.use: { default: true }
  onesmp.crate.use: { default: true }
  onesmp.crate.admin: { default: op }
  onesmp.home.use: { default: true }
  onesmp.home.unlimited: { default: false }
  onesmp.warp.use: { default: true }
  onesmp.warp.admin: { default: op }
  onesmp.tpa.use: { default: true }
  onesmp.rtp.use: { default: true }
  onesmp.rtp.admin: { default: op }
  onesmp.guild.use: { default: true }
  onesmp.guild.admin: { default: op }
  onesmp.chat.format: { default: false }
  onesmp.spawn.use: { default: true }
  onesmp.spawn.admin: { default: op }
  onesmp.moderation.spectate: { default: op }
  onesmp.maintenance.admin: { default: op }
  onesmp.maintenance.bypass: { default: op }
  onesmp.world.admin: { default: op }
  onesmp.msg.use: { default: true }
  onesmp.msg.socialspy: { default: op }
  onesmp.stats.use: { default: true }
  onesmp.stats.hologram.admin: { default: op }
  onesmp.help.use: { default: true }
  onesmp.discord.use: { default: true }
  onesmp.store.use: { default: true }
