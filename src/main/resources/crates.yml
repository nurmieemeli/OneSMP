# Each top-level entry under "crates" is a crate type, bound to physical blocks in the world with
# /crate create <type> and opened by right-clicking that block while holding a matching key.
#
# key-material: the item Material used for this crate's key (display name/lore are set below,
#   regardless of what the item would normally look like).
# rewards: a weighted pool - each entry needs "weight" (higher = more common) and at least one of
#   "items" (Material -> amount), "money", or "commands" (console commands, %player% is replaced
#   with the winner's name). "broadcast: true" announces the win to the whole server.
crates:
  common:
    display-name: "<gray>Common Crate"
    key-name: "<gray>Common Key"
    key-material: TRIPWIRE_HOOK
    key-lore:
      - "<dark_gray>Right-click a Common Crate to open."
    rewards:
      iron:
        weight: 40
        display-name: "<white>16 Iron Ingots"
        items:
          IRON_INGOT: 16
      coins-small:
        weight: 30
        display-name: "<green>250 Coins"
        money: 250
      diamonds:
        weight: 20
        display-name: "<aqua>4 Diamonds"
        items:
          DIAMOND: 4
      coins-big:
        weight: 9
        display-name: "<gold>2000 Coins"
        money: 2000
      netherite:
        weight: 1
        display-name: "<light_purple><bold>Netherite Ingot"
        broadcast: true
        items:
          NETHERITE_INGOT: 1
