# CanvasSuite messages — MiniMessage format.
# Supports MiniPlaceholders tags (e.g. <player_name>, <player_world>) anywhere,
# plus the message-specific placeholders documented next to each entry.

prefix: "<gradient:#38bdf8:#818cf8><bold>Canvas</bold></gradient><dark_gray> » </dark_gray>"

general:
  no-permission: "<prefix><red>You don't have permission to do that."
  player-only: "<prefix><red>Only players can do that."
  player-not-found: "<prefix><red>Player <white><target></white> could not be found."
  world-not-found: "<prefix><red>World <white><world></white> could not be found."
  invalid-number: "<prefix><red>'<input>' isn't a valid number."
  unknown-command: "<prefix><red>Unknown subcommand. Use <white><usage></white>."
  reloaded: "<prefix><green>Configuration reloaded."

economy:
  balance-self: "<prefix><gray>Your balance: <green><balance></green>"
  balance-other: "<prefix><gray><target>'s balance: <green><balance></green>"
  pay-sent: "<prefix><green>You paid <white><target></white> <green><amount></green>."
  pay-received: "<prefix><green>You received <green><amount></green> from <white><sender></white>."
  pay-self: "<prefix><red>You can't pay yourself."
  pay-insufficient-funds: "<prefix><red>You don't have enough money to send <amount>."
  pay-invalid-amount: "<prefix><red>Amount must be greater than zero."
  eco-give: "<prefix><green>Gave <green><amount></green> to <white><target></white>."
  eco-take: "<prefix><green>Took <green><amount></green> from <white><target></white>."
  eco-set: "<prefix><green>Set <white><target></white>'s balance to <green><amount></green>."
  baltop-header: "<prefix><gray>Richest players <dark_gray>(page <page>/<pages>)</dark_gray>:"
  baltop-entry: "<gray>#<rank> <white><player></white> <dark_gray>-</dark_gray> <green><balance>"

shop:
  bought: "<prefix><green>Bought <white><amount>x <item></white> for <green><price></green>."
  sold: "<prefix><green>Sold <white><amount>x <item></white> for <green><price></green>."
  not-sellable: "<prefix><red>That item can't be sold here."
  not-buyable: "<prefix><red>That item can't be bought here."
  not-enough-items: "<prefix><red>You don't have <amount>x <item>."
  inventory-full: "<prefix><red>Your inventory is full, some items were refunded."
  insufficient-funds: "<prefix><red>You need <green><price></green> to buy that."

teleport:
  home-set: "<prefix><green>Home <white><name></white> set."
  home-deleted: "<prefix><green>Home <white><name></white> deleted."
  home-not-found: "<prefix><red>You don't have a home named <white><name></white>."
  home-limit-reached: "<prefix><red>You've reached your home limit (<limit>)."
  no-homes: "<prefix><gray>You don't have any homes yet. Use <white>/sethome</white>."
  warp-set: "<prefix><green>Warp <white><name></white> created."
  warp-deleted: "<prefix><green>Warp <white><name></white> deleted."
  warp-not-found: "<prefix><red>No warp named <white><name></white> exists."
  no-warps: "<prefix><gray>There are no warps yet."
  teleporting: "<prefix><gray>Teleporting in <white><seconds>s</white>, don't move..."
  teleport-cancelled-move: "<prefix><red>Teleport cancelled — you moved."
  teleported: "<prefix><green>Teleported."
  back-none: "<prefix><red>You have no previous location to return to."
  tpa-sent: "<prefix><gray>Teleport request sent to <white><target></white>."
  tpa-received: "<prefix><yellow><sender></yellow> wants to teleport to you. <green><click:run_command:'/tpaccept'>[Accept]</click></green> <red><click:run_command:'/tpdeny'>[Deny]</click></red>"
  tpahere-received: "<prefix><yellow><sender></yellow> wants you to teleport to them. <green><click:run_command:'/tpaccept'>[Accept]</click></green> <red><click:run_command:'/tpdeny'>[Deny]</click></red>"
  tpa-accepted: "<prefix><green><target> accepted your teleport request."
  tpa-denied: "<prefix><red><target> denied your teleport request."
  tpa-none-pending: "<prefix><red>You have no pending teleport requests."
  tpa-expired: "<prefix><red>Your teleport request to <target> expired."
  tpa-self: "<prefix><red>You can't request to teleport to yourself."
  tpa-already-pending: "<prefix><red>You already have a pending request to <target>."

rtp:
  searching: "<prefix><gray>Searching for a safe location..."
  success: "<prefix><green>Teleported to a random location."
  failed: "<prefix><red>Couldn't find a safe location, try again."
  cooldown: "<prefix><red>You must wait <white><seconds>s</white> before using this again."
  insufficient-funds: "<prefix><red>Random teleport costs <green><price></green>."
  world-disallowed: "<prefix><red>Random teleport isn't allowed in this world."
  no-worlds-enabled: "<prefix><red>Random teleport isn't enabled in any world yet."

guild:
  created: "<prefix><green>Guild <white><name></white> [<tag>] created."
  disbanded: "<prefix><green>Your guild has been disbanded."
  already-in-guild: "<prefix><red>You're already in a guild."
  not-in-guild: "<prefix><red>You're not in a guild."
  name-taken: "<prefix><red>That guild name is already taken."
  tag-taken: "<prefix><red>That guild tag is already taken."
  invalid-name: "<prefix><red>Guild names must be <min>-<max> characters."
  invalid-tag: "<prefix><red>Guild tags must be at most <max> characters."
  insufficient-funds-create: "<prefix><red>Creating a guild costs <green><price></green>."
  invited: "<prefix><green>Invited <white><target></white> to your guild."
  invite-received: "<prefix><yellow><guild></yellow> invited you to join. <green><click:run_command:'/guild accept'>[Accept]</click></green>"
  invite-none: "<prefix><red>You have no pending guild invites."
  target-in-guild: "<prefix><red><target> is already in a guild."
  joined: "<prefix><green>You joined <white><guild></white>."
  left: "<prefix><green>You left <white><guild></white>."
  kicked: "<prefix><green>Kicked <white><target></white> from the guild."
  kicked-notice: "<prefix><red>You were kicked from <white><guild></white>."
  promoted: "<prefix><green><target> was promoted to <role>."
  demoted: "<prefix><green><target> was demoted to <role>."
  not-member: "<prefix><red><target> isn't a member of your guild."
  no-permission-role: "<prefix><red>Your guild role doesn't allow that."
  home-set: "<prefix><green>Guild home set."
  home-not-set: "<prefix><red>Your guild hasn't set a home yet."
  member-limit-reached: "<prefix><red>This guild is full (<limit> members)."
  full-member-limit: "<prefix><red>Guild member limit reached."
  owner-must-disband: "<prefix><red>You're the owner — disband the guild with /guild disband instead of leaving."
  chat-enabled: "<prefix><green>Guild chat enabled. Messages you send now go only to your guild."
  chat-disabled: "<prefix><gray>Guild chat disabled."
  info-header: "<prefix><gradient:#38bdf8:#818cf8><bold><guild_name></bold></gradient> <gray>[<guild_tag>]</gray>"
  info-line: "<gray><label>: <white><value>"
  list-header: "<prefix><gray>Guilds (<count>):"
  list-entry: "<gray>- <white><name></white> <dark_gray>[<tag>]</dark_gray>"

protection:
  portal-blocked: "<prefix><red>Nether portal creation is disabled on this server."

spawn:
  set: "<prefix><green>Spawn point set to your current location."
  teleported: "<prefix><green>Teleported to spawn."

nametag:
  # Rendered per-player (not per-viewer - team packets aren't relational, one team assignment is
  # broadcast identically to every viewer), used as the overhead nametag prefix.
  format: "<luckperms_prefix>"

moderation:
  spectate-started: "<prefix><green>Now spectating <white><target></white>."
  spectate-stopped: "<prefix><green>Stopped spectating."
  packetevents-required: "<prefix><red>This feature requires the PacketEvents plugin to be installed on the server."

tablist:
  header: "<gradient:#38bdf8:#818cf8><bold>CanvasMC</bold></gradient>"
  footer: "<gray>play.example.com"

msg:
  sent: "<prefix><gray>To <white><target></white>: <message>"
  received: "<prefix><gray>From <white><sender></white>: <message>"
  socialspy: "<prefix><dark_gray>[Spy] <sender> → <target>: <message>"
  self: "<prefix><red>You can't message yourself."
  blocked: "<prefix><red>Your message could not be delivered."
  cooldown: "<prefix><red>Please wait <white><seconds>s</white> before sending another message."
  no-reply-target: "<prefix><red>You have no one to reply to."
  reply-target-offline: "<prefix><red>That player is no longer online."
  ignore-self: "<prefix><red>You can't ignore yourself."
  ignore-enabled: "<prefix><green>You are now ignoring <white><target></white>."
  ignore-disabled: "<prefix><green>You are no longer ignoring <white><target></white>."
  socialspy-enabled: "<prefix><green>Social spy enabled."
  socialspy-disabled: "<prefix><gray>Social spy disabled."

world:
  created: "<prefix><green>World <white><name></white> created."
  create-failed: "<prefix><red>Failed to create world <white><name></white>."
  deleted: "<prefix><green>World <white><name></white> unloaded and no longer tracked."
  wiped: "<prefix><green>World <white><name></white> unloaded and its files were permanently deleted."
  not-found: "<prefix><red>No managed world named <white><name></white> exists."
  name-taken: "<prefix><red>A world named <white><name></white> already exists."
  invalid-name: "<prefix><red>World names must be 3-32 characters (letters, numbers, - and _ only)."

gui:
  close: "<gray>Close"
  back: "<gray>« Back"
  next-page: "<gray>Next Page »"
  previous-page: "<gray>« Previous Page"
