# CanvasSuite command aliases.
#
# Every command's own name (e.g. "balance") always works no matter what's listed here - these are
# EXTRA aliases layered on top, applied at plugin enable by directly registering them in Bukkit's
# command map against the same command. Add/remove/edit freely; changes take effect on next
# server restart (aliases are applied once at enable, not re-checked while running).
#
# If an alias is already taken by another plugin or a vanilla command, CanvasSuite's alias won't
# override it - check the server log at startup for a warning if that happens.
aliases:
  balance: [bal, money]
  pay: []
  baltop: []
  eco: []
  shop: []
  sethome: []
  home: [homes]
  delhome: []
  setwarp: []
  warp: [warps]
  delwarp: []
  tpa: []
  tpahere: []
  tpaccept: []
  tpdeny: []
  back: []
  rtp: [wild, wilderness, randomtp]
  guild: [g, clan, team, faction]
  setspawn: []
  spawn: []
  spectate: []
  world: [worlds]
  msg: [tell, w, pm]
  reply: [r]
  ignore: []
  socialspy: []
