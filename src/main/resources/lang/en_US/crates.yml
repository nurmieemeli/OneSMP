# Each entry under "crates" is a crate type, bound to a block with /crate create <type>.
# key-material is just the base item; its display name/lore below can make it look like anything.
# Each reward needs "weight" (higher = more common) and at least one of "items" (Material -> amount),
# "money", or "commands" (%player% is replaced with the winner's name); "broadcast: true" announces it server-wide.
# display-item optionally overrides the reel/preview icon (defaults to the first item, or gold/a star for money/command-only rewards).
crates:
  common:
    display-name: "<gray>Common Crate"
    key-name: "<gray>Common Key"
    key-material: TRIPWIRE_HOOK
    key-lore:
      - "<dark_gray>Right-click a Common Crate to open."
    rewards:
      iron:
        weight: 25
        display-name: "<white>32 Iron Ingots"
        items:
          IRON_INGOT: 32
      gold:
        weight: 20
        display-name: "<white>16 Gold Ingots"
        items:
          GOLD_INGOT: 16
      emerald:
        weight: 20
        display-name: "<white>8 Emeralds"
        items:
          EMERALD: 8
      diamond:
        weight: 15
        display-name: "<white>6 Diamonds"
        items:
          DIAMOND: 6
      shulker:
        weight: 2
        display-name: "<white>1 Shulker Box"
        items:
          SHULKER_BOX: 1
      small-xp:
        weight: 25
        display-name: "<white>4 Experience Bottles"
        items:
          EXPERIENCE_BOTTLE: 4
      big-xp:
        weight: 15
        display-name: "<white>8 Experience Bottles"
        items:
          EXPERIENCE_BOTTLE: 8
      netherite:
        weight: 1
        display-name: "<white>1 Netherite Ingot"
        items:
          NETHERITE_INGOT: 1
      money-small:
        weight: 30
        display-name: "<white>1250 Dollars"
        money: 1250
        display-item: BUNDLE
      money-big:
        weight: 20
        display-name: "<white>2500 Dollars"
        money: 2500
        display-item: RED_BUNDLE
      rare-key:
        weight: 15
        display-name: "<green>Rare Key"
        display-item: TRIPWIRE_HOOK
        commands:
          - "crate key rare %player% 1"
      epic-key:
