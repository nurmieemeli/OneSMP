# Extra aliases layered on a command's own name; applied once at enable via Bukkit's command map, so changes need a restart.
# A name already taken by another plugin is skipped (see the startup log).
aliases:
  onesmp: [os]
  balance: [bal, money]
  pay: []
  baltop: [bt]
  eco: []
  sethome: []
  home: [homes]
  delhome: []
  setwarp: []
  warp: [warps]
  delwarp: []
  tpa: []
  tpahere: []
  tpaccept: []
  tpdeny: []
  rtp: [wild, wilderness, randomtp]
  guild: [g, clan, team, faction]
  setspawn: []
  spawn: []
  spectate: [spec]
  world: [worlds]
  msg: [message, tell, w, pm]
  reply: [r]
  ignore: []
  socialspy: []
