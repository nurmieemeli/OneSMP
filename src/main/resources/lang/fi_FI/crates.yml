# Jokainen "crates"-kohdan alla oleva alkio on arkkutyyppi, joka sidotaan lohkoon komennolla /crate create <type>.
# key-material on vain peruskappale; alla oleva näyttönimi/lore voi saada sen näyttämään miltä tahansa.
# Jokainen palkinto tarvitsee "weight"-arvon (suurempi = yleisempi) ja vähintään yhden seuraavista: "items" (Material -> määrä),
# "money" tai "commands" (%player% korvataan voittajan nimellä); "broadcast: true" ilmoittaa siitä koko palvelimelle.
# display-item voi valinnaisesti korvata rullan/esikatselun kuvakkeen (oletuksena ensimmäinen esine, tai kulta/tähti pelkille raha-/komentopalkinnoille).
