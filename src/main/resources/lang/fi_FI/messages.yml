chat:
  # <guild_segment> ei renderöi mitään ilman kiltaa - älä koodaa hakasulkeita <guild_tag>:n ympärille kiinteästi, käytä sen sijaan alla olevaa guild-segment-format-arvoa.
  # guild-chat-format voi käyttää myös <guild_segment>-tagia (sekä <guild_name>/<guild_tag> suoraan) - lähettäjä on siellä aina killassa, joten se ei koskaan renderöidy tyhjänä.
  # Poista <luckperms_prefix>/<luckperms_suffix> jos MiniPlaceholders-LuckPerms-laajennusta ei ole asennettu, muuten jäsentäminen epäonnistuu jokaisessa viestissä.
  # <player_name> perii <luckperms_prefix>:n värin jos etuliite ei sulje omaa tagiaan - lisää oma <reset>-tagisi tähän jos et halua tätä.
  format: "<guild_segment><luckperms_prefix><player_name><gray>:</gray> <white><message>"
  guild-chat-format: "<dark_aqua>[G]</dark_aqua> <guild_segment><gray><player_name>:</gray> <aqua><message>"
  # Sisällytä oma välilyöntisi lopussa - kiltattoman tapauksessa jätetään pois sekä hakasulkeet että välilyönti.
  guild-segment-format: "<dark_aqua>[<aqua><guild_tag></aqua>]</dark_aqua> "

