# Cada entrada bajo "crates" es un tipo de caja, vinculada a un bloque con /crate create <type>.
# key-material es solo el objeto base; su nombre de visualización/lore de abajo puede hacer que parezca cualquier cosa.
# Cada recompensa necesita "weight" (más alto = más común) y al menos uno de "items" (Material -> cantidad),
# "money", o "commands" (%player% se sustituye por el nombre del ganador); "broadcast: true" lo anuncia a todo el servidor.
# display-item sobrescribe opcionalmente el icono de la ruleta/vista previa (por defecto es el primer objeto, u oro/una estrella para recompensas solo de dinero/comandos).
crates:
  common:
    display-name: "<gray>Caja Común"
    key-name: "<gray>Llave Común"
    key-material: TRIPWIRE_HOOK
    key-lore:
      - "<dark_gray>Haz clic derecho en una Caja Común para abrirla."
    rewards:
      iron:
        weight: 25
        display-name: "<white>32 Lingotes de Hierro"
        items:
          IRON_INGOT: 32
      gold:
        weight: 20
        display-name: "<white>16 Lingotes de Oro"
        items:
          GOLD_INGOT: 16
      emerald:
        weight: 20
        display-name: "<white>8 Esmeraldas"
        items:
          EMERALD: 8
      diamond:
        weight: 15
        display-name: "<white>6 Diamantes"
        items:
          DIAMOND: 6
      shulker:
        weight: 2
        display-name: "<white>1 Caja Shulker"
        items:
          SHULKER_BOX: 1
      small-xp:
        weight: 25
        display-name: "<white>4 Botellas de Experiencia"
        items:
          EXPERIENCE_BOTTLE: 4
      big-xp:
        weight: 15
        display-name: "<white>8 Botellas de Experiencia"
        items:
          EXPERIENCE_BOTTLE: 8
      netherite:
        weight: 1
        display-name: "<white>1 Lingote de Netherita"
        items:
          NETHERITE_INGOT: 1
      money-small:
        weight: 30
        display-name: "<white>1250 Dólares"
        money: 1250
        display-item: BUNDLE
      money-big:
        weight: 20
        display-name: "<white>2500 Dólares"
        money: 2500
        display-item: RED_BUNDLE
      rare-key:
        weight: 15
        display-name: "<green>Llave Rara"
        display-item: TRIPWIRE_HOOK
        commands:
          - "crate key rare %player% 1"
      epic-key:
        weight: 7
        display-name: "<dark_purple>Llave Épica"
        display-item: TRIPWIRE_HOOK
        commands:
          - "crate key epic %player% 1"

