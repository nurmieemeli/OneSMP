chat:
  # <guild_segment> no muestra nada si no hay gremio - no pongas corchetes fijos alrededor de <guild_tag>, usa guild-segment-format más abajo en su lugar.
  # guild-chat-format también puede usar <guild_segment> (además de <guild_name>/<guild_tag> directamente) - el remitente siempre está en un gremio ahí, así que nunca se muestra vacío.
  # Elimina <luckperms_prefix>/<luckperms_suffix> si la expansión MiniPlaceholders-LuckPerms no está instalada, o el análisis fallará en cada mensaje.
  # <player_name> hereda el color de <luckperms_prefix> si ese prefijo no cierra su propia etiqueta - añade tu propio <reset> aquí si no quieres eso.
  format: "<guild_segment><luckperms_prefix><player_name><gray>:</gray> <white><message>"
  guild-chat-format: "<dark_aqua>[G]</dark_aqua> <guild_segment><gray><player_name>:</gray> <aqua><message>"
  # Incluye tu propio espacio final - el caso sin gremio omite tanto los corchetes como el espacio.
  guild-segment-format: "<dark_aqua>[<aqua><guild_tag></aqua>]</dark_aqua> "

