# Alias adicionales junto al propio nombre del comando; se aplican una vez al iniciar mediante el mapa de comandos de Bukkit, así que los cambios requieren reiniciar.
# Un nombre ya usado por otro plugin se omite (consulta el registro de inicio).
aliases:
  onesmp: [os]
  balance: [saldo, dinero]
  pay: []
  baltop: [bt]
  eco: []
  sethome: []
  home: [casa, hogar]
  delhome: []
  setwarp: []
  warp: [teletransporte, warps]
  delwarp: []
  tpa: []
  tpahere: []
  tpaccept: []
  tpdeny: []
  rtp: [salvaje, aleatorio]
  guild: [g, gremio, equipo]
  setspawn: []
  spawn: []
  spectate: [spec]
  world: [mundo, mundos]
  msg: [mensaje, decir, w, pm]
  reply: [r]
  ignore: []
  socialspy: []
