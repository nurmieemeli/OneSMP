# Каждая запись под "crates" - это тип кейса, привязываемый к блоку через /crate create <type>.
# key-material - это просто базовый предмет; его имя/лор ниже могут сделать его похожим на что угодно.
# Каждой награде нужен "weight" (выше = чаще выпадает) и хотя бы одно из "items" (Material -> количество),
# "money" или "commands" (%player% заменяется именем победителя); "broadcast: true" объявляет об этом на весь сервер.
# display-item опционально переопределяет иконку в барабане/превью (по умолчанию - первый предмет, либо золото/звезда для наград только с деньгами/командами).
crates:
  common:
    display-name: "<gray>Обычный кейс"
    key-name: "<gray>Обычный ключ"
    key-material: TRIPWIRE_HOOK
    key-lore:
      - "<dark_gray>Нажмите правой кнопкой на Обычный кейс, чтобы открыть."
    rewards:
      iron:
        weight: 25
        display-name: "<white>32 железных слитка"
        items:
          IRON_INGOT: 32
      gold:
        weight: 20
        display-name: "<white>16 золотых слитков"
        items:
          GOLD_INGOT: 16
      emerald:
        weight: 20
        display-name: "<white>8 изумрудов"
        items:
          EMERALD: 8
      diamond:
        weight: 15
        display-name: "<white>6 алмазов"
        items:
          DIAMOND: 6
      shulker:
        weight: 2
        display-name: "<white>1 шалкеровский ящик"
        items:
          SHULKER_BOX: 1
      small-xp:
        weight: 25
        display-name: "<white>4 бутылки опыта"
        items:
          EXPERIENCE_BOTTLE: 4
      big-xp:
        weight: 15
        display-name: "<white>8 бутылок опыта"
        items:
          EXPERIENCE_BOTTLE: 8
      netherite:
        weight: 1
        display-name: "<white>1 слиток незерита"
        items:
          NETHERITE_INGOT: 1
      money-small:
        weight: 30
        display-name: "<white>1250 долларов"
        money: 1250
        display-item: BUNDLE
      money-big:
        weight: 20
        display-name: "<white>2500 долларов"
        money: 2500
        display-item: RED_BUNDLE
      rare-key:
        weight: 15
        display-name: "<green>Редкий ключ"
        display-item: TRIPWIRE_HOOK
        commands:
          - "crate key rare %player% 1"
      epic-key:
        weight: 7
        display-name: "<dark_purple>Эпический ключ"
        display-item: TRIPWIRE_HOOK
