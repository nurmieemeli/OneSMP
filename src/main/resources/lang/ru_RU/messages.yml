# Каждое значение здесь поддерживает форматирование MiniMessage и теги MiniPlaceholders.
# <success>/<fail> определяют, будет ли воспроизведён звук успеха или звук отказа (см. effects.command-feedback
# в config.yml) - размещайте их сразу после <prefix>, так же как <green>/<red> используются в других местах.
