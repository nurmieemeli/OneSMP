chat:
  # <guild_segment> ничего не выводит без гильдии - не прописывайте скобки вокруг <guild_tag> жёстко, используйте guild-segment-format ниже.
  # guild-chat-format тоже может использовать <guild_segment> (а также напрямую <guild_name>/<guild_tag>) - отправитель там всегда состоит в гильдии, поэтому пустым это не бывает.
  # Уберите <luckperms_prefix>/<luckperms_suffix>, если расширение MiniPlaceholders-LuckPerms не установлено, иначе парсинг будет падать на каждом сообщении.
  # <player_name> наследует цвет <luckperms_prefix>, если тот не закрывает свой тег - добавьте свой <reset> здесь, если это нежелательно.
  format: "<guild_segment><luckperms_prefix><player_name><gray>:</gray> <white><message>"
  guild-chat-format: "<dark_aqua>[Г]</dark_aqua> <guild_segment><gray><player_name>:</gray> <aqua><message>"
  # Добавьте свой завершающий пробел - при отсутствии гильдии убираются и скобки, и пробел.
  guild-segment-format: "<dark_aqua>[<aqua><guild_tag></aqua>]</dark_aqua> "

join-leave:
  join: "<gray>[<green>+</green>] <player_name>"
  leave: "<gray>[<red>-</red>] <player_name>"

# Заменяет обычное сообщение о смерти (которое иначе показывается на клиентском языке каждого игрока), чтобы
# все видели его на выбранном языке сервера. <victim>/<killer>/<mob> - это просто имена игрока/существа.
