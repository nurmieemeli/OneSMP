chat:
  # <guild_segment> renders to nothing without a guild - don't hardcode brackets around <guild_tag>, use guild-segment-format below instead.
  # guild-chat-format can use <guild_segment> too (plus <guild_name>/<guild_tag> directly) - the sender is always in a guild there, so it never renders empty.
  # Remove <luckperms_prefix>/<luckperms_suffix> if the MiniPlaceholders-LuckPerms expansion isn't installed, or parsing will fail on every message.
  # <player_name> inherits <luckperms_prefix>'s color if that prefix doesn't close its own tag - add your own <reset> here if that's unwanted.
  format: "<guild_segment><luckperms_prefix><player_name><gray>:</gray> <white><message>"
  guild-chat-format: "<dark_aqua>[G]</dark_aqua> <guild_segment><gray><player_name>:</gray> <aqua><message>"
  # Include your own trailing space - the no-guild case omits both the brackets and the space.
  guild-segment-format: "<dark_aqua>[<aqua><guild_tag></aqua>]</dark_aqua> "

join-leave:
  join: "<gray>[<green>+</green>] <player_name>"
  leave: "<gray>[<red>-</red>] <player_name>"

