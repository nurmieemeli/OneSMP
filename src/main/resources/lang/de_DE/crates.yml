# Each entry under "crates" is a crate type, bound to a block with /crate create <type>.
# key-material is just the base item; its display name/lore below can make it look like anything.
# Each reward needs "weight" (higher = more common) and at least one of "items" (Material -> amount),
# "money", or "commands" (%player% is replaced with the winner's name); "broadcast: true" announces it server-wide.
# display-item optionally overrides the reel/preview icon (defaults to the first item, or gold/a star for money/command-only rewards).
crates:
  common:
    display-name: "<gray>Gewöhnliche Kiste"
    key-name: "<gray>Gewöhnlicher Schlüssel"
    key-material: TRIPWIRE_HOOK
    key-lore:
      - "<dark_gray>Rechtsklick auf eine Gewöhnliche Kiste zum Öffnen."
    rewards:
      iron:
        weight: 25
        display-name: "<white>32 Eisenbarren"
        items:
          IRON_INGOT: 32
      gold:
        weight: 20
        display-name: "<white>16 Goldbarren"
        items:
          GOLD_INGOT: 16
      emerald:
        weight: 20
        display-name: "<white>8 Smaragde"
        items:
          EMERALD: 8
      diamond:
        weight: 15
        display-name: "<white>6 Diamanten"
        items:
          DIAMOND: 6
      shulker:
        weight: 2
        display-name: "<white>1 Shulkerkiste"
        items:
          SHULKER_BOX: 1
      small-xp:
        weight: 25
        display-name: "<white>4 Erfahrungsflaschen"
        items:
          EXPERIENCE_BOTTLE: 4
      big-xp:
        weight: 15
        display-name: "<white>8 Erfahrungsflaschen"
        items:
          EXPERIENCE_BOTTLE: 8
      netherite:
        weight: 1
        display-name: "<white>1 Netheritbarren"
        items:
          NETHERITE_INGOT: 1
      money-small:
        weight: 30
        display-name: "<white>1250 Dollar"
        money: 1250
        display-item: BUNDLE
      money-big:
        weight: 20
        display-name: "<white>2500 Dollar"
        money: 2500
        display-item: RED_BUNDLE
      rare-key:
        weight: 15
        display-name: "<green>Seltener Schlüssel"
        display-item: TRIPWIRE_HOOK
