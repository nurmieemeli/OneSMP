# Which set of lang/<code>/*.yml files to load for messages.yml/help.yml/crates.yml content. Supported out of box:
# en_US, fi_FI, sv_SE, de_DE, ru_RU, es_ES. Falls back to en_US (with a warning) if unrecognized.
language: en_US

links:
  discord-url: "https://discord.gg/your-invite"
  store-url: "https://store.example.com"

storage:
  # Falls back to local SQLite automatically if MYSQL is selected but the connection fails.
  type: SQLITE
  mysql:
    host: localhost
    port: 3306
    database: databaseName
    username: databaseUsername
    password: ""
    useSSL: false
    pool-size: 10
  sqlite:
    file: data.db

economy:
  currency-symbol: "$"
  currency-name-singular: dollar
  currency-name-plural: dollars
  starting-balance: 100.00
  max-balance: 1000000000.00

shop:
  # e.g. 0.75 = sell for 75% of list price.
  sell-price-multiplier: 1.0

market:
  # A player can't have more than this many active listings at once.
  max-listings-per-player: 10

# Silently ignores repeat attempts (no message, no sound) faster than this many milliseconds apart, per
# player and per category (market, shop-sell, crate-open) - guards against spam-clicking a GUI button or
# spamming a command faster than its async round-trip, which could otherwise race past checks like
# market.max-listings-per-player or trigger overlapping crate-opening animations.
anti-spam:
  action-cooldown-millis: 500

# Cosmetic sound/particle feedback only - never affects whether an action succeeds.
effects:
  enabled: true
  # Success chime or denial grunt, picked from whether the command's message starts with <success> or <fail> in messages.yml.
  command-feedback: true
  gui-open: true
  teleport: true
  join: true

teleport:
  tpa-request-timeout-seconds: 60
  teleport-warmup-seconds: 3
  cancel-warmup-on-move: true
  home-limit-permission-prefix: "onesmp.home.limit."
  default-home-limit: 3

rtp:
  min-radius: 0
  max-radius: 5000
  cooldown-seconds: 300
  max-attempts: 30
  # A world only shows up in /rtp (GUI or by name) if listed here with enabled: true; each can charge its own fee.
  worlds:
    world:
      enabled: true
      cost: 0
    the_nether:
      enabled: true
      cost: 5000
    the_end:
      enabled: false
      cost: 500000
  avoid-biomes:
    - "minecraft:ocean"
    - "minecraft:deep_ocean"
    - "minecraft:frozen_ocean"
    - "minecraft:river"
    - "minecraft:void"
  precache:
    enabled: true
    target-size: 15
    interval-seconds: 5
    # Skips topping off the cache while TPS is below this, so precaching never competes with real load.
    min-tps: 18.0

guild:
  max-name-length: 10
  min-name-length: 3
  max-tag-length: 5
  default-member-limit: 12
  creation-cost: 500.0
  allow-guild-bank: true

# Backed by the server's real whitelist (whitelist.json) - /maintenance on/off flips server.getWhitelist()
# directly, so turning maintenance off also turns the real whitelist off.
maintenance:
  # Kept in sync with /maintenance on/off; editing this directly takes effect on the next /onesmp reload.
  enabled: false

spawn:
  # The void world OneSMP creates automatically on first enable.
  world-name: "spawnworld"
  # The current spawn point's world; only used as a default until /setspawn is run once.
  world: "spawnworld"
  x: 0.5
  y: 65.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0
  # Internal - set automatically once the starter platform is built, so it's never rebuilt on a later
  # restart. Don't hand-edit this unless you want the platform re-created.
  platform-built: false

# Overhead nametag prefixes via PacketEvents team packets only - no real scoreboard team is ever registered. Requires PacketEvents, silently disabled otherwise.
nametag:
  enabled: true
  # No LuckPerms API hook is used (prefixes come via the MiniPlaceholders-LuckPerms expansion instead), so this is a polling interval.
  refresh-interval-seconds: 30
  guild-tag:
    # Second nametag line for guild members, rendered via a fake TEXT_DISPLAY entity since there's no vanilla way to stack a second line.
    format: "<dark_aqua>[<aqua><guild_tag></aqua>]</dark_aqua>"
    # How far above the mount point the line floats - a generic passenger has no defined seat height like a horse/boat.
    y-offset: 0.55
    # Re-sent periodically since it's a cheap packet, guarding against the passenger mount desyncing client-side.
    remount-interval-ticks: 20

tablist:
  enabled: true
  # Keeps the tablist visually full-size instead of shrinking to the online player count.
  reserved-slots-enabled: true
  # Signed Mojang skin texture for filler entries; blank falls back to a per-UUID Steve/Alex skin. Generate your own at mineskin.org.
  reserved-slot-skin:
    texture: ""
    signature: ""
  # Vanilla's tablist is a fixed 4-column grid; this is the row count (1-20, 20 = the full 80-slot grid).
  rows: 20
  refresh-interval-seconds: 5

msg:
  # 0 disables the cooldown entirely.
  cooldown-seconds: 3

join-leave:
  # false fully suppresses that message, including vanilla's own default line - not just a blank replacement.
  join-enabled: true
  leave-enabled: true

world-creation:
  # Every world OneSMP creates (the spawn void world and /world create) is nested under this path,
  # relative to the server's own world container - e.g. "world/dimensions/minecraft". Leave blank to
  # create worlds directly in the server's default location. Changing this after worlds already exist
  # won't move them - it only affects newly-created worlds.
  container: ""
  # Seeded into a fresh /world create session before the admin starts toggling anything in the GUI.
  defaults:
    environment: NORMAL
    type: NORMAL
    generator: VANILLA        # VANILLA or VOID
    generate-structures: true
    hardcore: false
    difficulty: NORMAL
    pvp: true

scoreboard:
  enabled: true
  refresh-interval-seconds: 5
  # title/lines moved to lang/<language>/messages.yml (scoreboard.title / scoreboard.lines) so they're translatable.

stats:
  # Broadcasts stats.killstreak-broadcast (messages.yml) whenever a killstreak hits one of these numbers.
  killstreak-broadcast-milestones: [5, 10, 25, 50, 100]
  # Frequent autosave limits how much playtime a crash could lose (kills/deaths persist immediately regardless).
  playtime-autosave-interval-seconds: 60
  # A death with no direct killer (fall, lava, void...) still credits the last player who hit the victim -
  # directly, via a shot projectile, via TNT they lit, via an End Crystal they broke, or via a respawn anchor
  # they triggered - as long as that hit landed within this many seconds.
  indirect-kill-window-seconds: 15

combat-log:
  enabled: true
  # A player who disconnects within this many seconds of being hit by another player - directly, via a shot
  # projectile, via TNT they lit, via an End Crystal they broke, or via a respawn anchor they triggered - is
  # killed instead of safely logging out of the fight. Goes through the normal damage pipeline, so a totem of
  # undying/resistance/absorption still applies as it would for any hit.
  timeout-seconds: 15
  # Blocks /home, /warp, /spawn, /rtp, guild home, world teleports, and TPA (both accepting one yourself
  # and having someone else accept a request that would bring them to you) for the same window above -
  # independent of the enabled/kill-on-quit setting.
  disable-teleport: true

# Requires FancyHolograms (disables /statshologram otherwise). FancyHolograms owns the hologram entities themselves; this only controls how often their text is refreshed.
hologram:
  refresh-interval-seconds: 30

# Requires NuVotifier installed alongside OneSMP to actually receive votes from listing sites - without it,
# /vote just shows the configured links below with no way to trigger a reward automatically.
vote:
  enabled: true
  # Announces every vote to the whole server when true; the voter always gets a private thank-you regardless.
  broadcast: true
  reward:
    money: 500.0
    # Must match a crate type key defined in lang/<language>/crates.yml.
    crate-type: common
    crate-key-amount: 1
  streak:
    # Extra reward on top of the base one above when a player's consecutive daily vote streak hits one of
    # these numbers. Voting more than once in the same day doesn't advance the streak, just the total count.
    milestones:
      7:
        money: 2000.0
        crate-key-amount: 3
      30:
        money: 10000.0
        crate-key-amount: 10
  # Shown by /vote. Each needs a name and a url.
  sites:
    - name: "PlanetMinecraft"
      url: "https://www.planetminecraft.com/server/example/vote/"
    - name: "Minecraft-MP"
      url: "https://minecraft-mp.com/server/00000/vote/"