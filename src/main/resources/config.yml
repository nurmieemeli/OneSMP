# CanvasSuite configuration

storage:
  # Storage type: MYSQL or SQLITE. If MYSQL is selected but the connection
  # cannot be established on startup, CanvasSuite automatically falls back
  # to the local SQLite file below.
  type: SQLITE
  mysql:
    host: localhost
    port: 3306
    database: databaseName
    username: databaseUsername
    password: ""
    useSSL: false
    pool-size: 10
  sqlite:
    file: data.db

economy:
  currency-symbol: "$"
  currency-name-singular: dollar
  currency-name-plural: dollars
  starting-balance: 100.00
  max-balance: 1000000000.00

shop:
  # Multiplier applied to every configured sell price, e.g. 0.75 = sell for 75% of list price.
  sell-price-multiplier: 1.0

teleport:
  tpa-request-timeout-seconds: 60
  teleport-warmup-seconds: 3
  cancel-warmup-on-move: true
  home-limit-permission-prefix: "canvassuite.home.limit."
  default-home-limit: 3

rtp:
  min-radius: 500
  max-radius: 5000
  cooldown-seconds: 300
  max-attempts: 30
  # Random teleport is opt-in per world - a world only shows up in /rtp's GUI (or works with
  # /rtp <world>) if it's listed here with enabled: true. Each world can charge its own fee.
  worlds:
    world:
      enabled: true
      cost: 0.0
  # Biome keys (namespaced) players should never be randomly teleported into.
  avoid-biomes:
    - "minecraft:ocean"
    - "minecraft:deep_ocean"
    - "minecraft:frozen_ocean"
    - "minecraft:river"
    - "minecraft:void"
  precache:
    enabled: true
    # Up to this many already-found safe locations are kept ready per world, so /rtp usually
    # teleports instantly instead of waiting on a fresh search.
    target-size: 15
    # Tries to add one more cached location this often.
    interval-seconds: 5
    # Skips topping off the cache if the server's recent TPS drops below this - only precaches
    # "whenever the server can handle it."
    min-tps: 18.0

guild:
  max-name-length: 16
  min-name-length: 3
  max-tag-length: 5
  default-member-limit: 10
  creation-cost: 500.0
  allow-guild-bank: true

chat:
  # <guild_segment> renders to nothing for players with no guild - don't bake brackets around
  # <guild_tag> directly in this format, use guild-segment-format below instead.
  # <luckperms_prefix>/<luckperms_suffix> require the MiniPlaceholders-LuckPerms expansion plugin
  # to be installed alongside MiniPlaceholders - remove them here if that expansion isn't installed,
  # otherwise MiniMessage will fail to parse the unknown tag on every chat message.
  format: "<guild_segment><luckperms_prefix><white><player_name></white><dark_gray>:</dark_gray> <gray><message>"
  guild-chat-format: "<dark_aqua>[G]</dark_aqua> <gray>[<guild_tag>]</gray> <white><player_name></white><dark_gray>:</dark_gray> <aqua><message>"
  # Used to build <guild_segment> only when the player is in a guild; include the trailing space
  # yourself so the no-guild case can omit both the brackets and the space cleanly.
  guild-segment-format: "<gray>[<guild_tag>]</gray> "

protection:
  disable-stronghold-generation: true
  disable-nether-portal-creation: true

spawn:
  # Created automatically on first enable if it doesn't already exist.
  world-name: "spawnworld"
  # Block used for the small starter platform placed under the default coordinates below, so
  # /spawn and first-join teleports have solid ground before any admin has run /setspawn.
  platform-material: "STONE"
  # Populated by /setspawn; these defaults are only used before any admin has run it.
  world: "spawnworld"
  x: 1.5
  y: 65.0
  z: 1.5
  yaw: 0.0
  pitch: 0.0

# Overhead nametag prefixes, sent via PacketEvents team packets only (no real scoreboard team is
# ever registered). Requires the PacketEvents plugin to be installed - silently disabled otherwise.
nametag:
  enabled: true
  # There's no LuckPerms hook available (prefixes come from the MiniPlaceholders-LuckPerms
  # expansion, not the LuckPerms API directly), so prefix changes are only picked up this often.
  refresh-interval-seconds: 30

tablist:
  enabled: true
  # Fills unused tablist slots with blank filler entries so it stays visually full-size instead of
  # shrinking to fit the online player count. Requires the PacketEvents plugin to be installed;
  # header/footer below still work without it.
  reserved-slots-enabled: true
  # Vanilla's tablist is a fixed 4-column grid; this is the row count (1-20, 20 = the full 80-slot grid).
  rows: 20
  refresh-interval-seconds: 5

msg:
  # Minimum seconds between messages sent by the same player; 0 disables the cooldown entirely.
  cooldown-seconds: 0

world-creation:
  # Seeded into a fresh /world create session before the admin starts toggling anything in the GUI.
  defaults:
    environment: NORMAL
    type: NORMAL
    generator: VANILLA        # VANILLA or VOID
    generate-structures: true
    hardcore: false
    difficulty: NORMAL
    pvp: true

scoreboard:
  enabled: true
  refresh-interval-seconds: 5
  title: "<gradient:#38bdf8:#818cf8><bold>CanvasMC</bold></gradient>"
  # Evaluated top-to-bottom (index 0 is the top line), rendered relationally per viewer.
  lines:
    - "<gray>---------------"
    - "<white>Player: <player_name>"
    - " "
    - "<white>Rank: <luckperms_primary_group_name>"
    - "<gray>---------------"
    - "<white>play.example.com"
