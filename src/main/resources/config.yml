storage:
  # Storage type: MYSQL or SQLITE. If MYSQL is selected but the connection
  # cannot be established on startup, CanvasSuite automatically falls back
  # to the local SQLite file below.
  type: SQLITE
  mysql:
    host: localhost
    port: 3306
    database: databaseName
    username: databaseUsername
    password: ""
    useSSL: false
    pool-size: 10
  sqlite:
    file: data.db

economy:
  currency-symbol: "$"
  currency-name-singular: dollar
  currency-name-plural: dollars
  starting-balance: 100.00
  max-balance: 1000000000.00

shop:
  # Multiplier applied to every configured sell price, e.g. 0.75 = sell for 75% of list price.
  sell-price-multiplier: 1.0

teleport:
  tpa-request-timeout-seconds: 60
  teleport-warmup-seconds: 3
  # If teleport should cancel if the player moves while waiting.
  cancel-warmup-on-move: true
  home-limit-permission-prefix: "canvassuite.home.limit."
  default-home-limit: 3

rtp:
  # Minimum x/z coordinate for a valid random teleportation location.
  min-radius: 0
  # Maximum x/z coordinate for a valid random teleportation location.
  max-radius: 5000
  # How long a player has to wait before using random teleport.
  cooldown-seconds: 300
  max-attempts: 30
  # Random teleport is opt-in per world - a world only shows up in /rtp's GUI (or works with
  # /rtp <world>) if it's listed here with enabled: true. Each world can charge its own fee.
  worlds:
    world:
      enabled: true
      cost: 0.0
  # Biomes players should never be randomly teleported into.
  avoid-biomes:
    - "minecraft:ocean"
    - "minecraft:deep_ocean"
    - "minecraft:frozen_ocean"
    - "minecraft:river"
    - "minecraft:void"
  precache:
    # If the server should precache safe locations.
    enabled: true
    # Up to this many already-found safe locations are kept ready per world, so /rtp usually
    # teleports instantly instead of waiting on a fresh search.
    target-size: 15
    # Tries to add one more cached location this often.
    interval-seconds: 5
    # Skips topping off the cache if the server's recent TPS drops below this - only precaches
    # whenever the server can handle it.
    min-tps: 18.0

guild:
  max-name-length: 10
  min-name-length: 3
  max-tag-length: 5
  default-member-limit: 12
  creation-cost: 500.0
  allow-guild-bank: true
  # Shown by the <guild_own_name>/<guild_own_tag> scoreboard/tablist placeholders (see the
  # `scoreboard` section below) for players who aren't in a guild. MiniMessage tags are parsed.
  no-guild-placeholder: "No Guild"

chat:
  # <guild_segment> renders to nothing for players with no guild - don't bake brackets around
  # <guild_tag> directly in this format, use guild-segment-format below instead.
  # <luckperms_prefix>/<luckperms_suffix> require the MiniPlaceholders-LuckPerms expansion plugin
  # to be installed alongside MiniPlaceholders - remove them here if that expansion isn't installed,
  # otherwise MiniMessage will fail to parse the unknown tag on every chat message.
  # <player_name> deliberately isn't reset/re-colored after <luckperms_prefix> - a prefix that
  # doesn't close its own color tag (e.g. "<red>[Admin] ") intentionally carries that color onto
  # the name too; add your own <reset> before <player_name> here if you don't want that.
  format: "<guild_segment><luckperms_prefix><player_name><gray>:</gray> <white><message>"
  guild-chat-format: "<dark_aqua>[G]</dark_aqua> <gray>[<guild_tag>]</gray> <white><player_name></white><gray>:</gray><aqua><message>"
  # Used to build <guild_segment> only when the player is in a guild; include the trailing space
  # yourself so the no-guild case can omit both the brackets and the space cleanly.
  guild-segment-format: "<gray>[<guild_tag>]</gray> "

protection:
  disable-stronghold-generation: true
  disable-nether-portal-creation: true

spawn:
  # Created automatically on first enable if it doesn't already exist.
  world-name: "spawnworld"
  # Populated by /setspawn; these defaults are only used before any admin has run it.
  world: "spawnworld"
  x: 0.5
  y: 65.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# Overhead nametag prefixes, sent via PacketEvents team packets only (no real scoreboard team is
# ever registered). Requires the PacketEvents plugin to be installed - silently disabled otherwise.
nametag:
  enabled: true
  # There's no LuckPerms hook available (prefixes come from the MiniPlaceholders-LuckPerms
  # expansion, not the LuckPerms API directly), so prefix changes are only picked up this often.
  refresh-interval-seconds: 30
  guild-tag:
    # Only shown while the player is in a guild - a second line above the normal nametag, rendered
    # via a fake TEXT_DISPLAY entity (there's no vanilla way to stack a second line on a player's
    # own nametag). <tag> is the guild's tag.
    format: "<gray>[<tag>]</gray>"
    # This line rides as a passenger on the player, so the client positions it with zero ongoing
    # packet cost. Since a generic passenger has no defined seat height like a horse/boat, this
    # offset controls how far above the mount point it floats. May need visual tuning in-game.
    y-offset: 0.55
    # Re-assert the mount periodically. Cheap way (a tiny packet,
    # not a position update), so this can be quite frequent.
    remount-interval-ticks: 20

tablist:
  enabled: true
  # Fills unused tablist slots with blank filler entries so it stays visually full-size instead of
  # shrinking to fit the online player count. Requires the PacketEvents plugin to be installed;
  # header/footer below still work without it.
  reserved-slots-enabled: true
  # Signed Mojang skin texture shown on every filler entry (defaults to a plain gray skin, from
  # mineskin.org). The client silently ignores an unsigned/invalid texture and falls back to a
  # per-UUID Steve/Alex skin instead, so leaving either value blank does the same. Generate your
  # own at mineskin.org and paste the resulting texture/signature here to use a different skin.
  reserved-slot-skin:
    texture: ""
    signature: ""
  # Vanilla's tablist is a fixed 4-column grid; this is the row count (1-20, 20 = the full 80-slot grid).
  rows: 20
  refresh-interval-seconds: 5

msg:
  # Minimum seconds between messages sent by the same player; 0 disables the cooldown entirely.
  cooldown-seconds: 3

join-leave:
  # Set either to false to fully suppress that message (vanilla's default join/quit line included -
  # not just replaced with a blank one). Templates are in messages.yml under join-leave.
  join-enabled: true
  leave-enabled: true

world-creation:
  # Seeded into a fresh /world create session before the admin starts toggling anything in the GUI.
  defaults:
    environment: NORMAL
    type: NORMAL
    generator: VANILLA        # VANILLA or VOID
    generate-structures: true
    hardcore: false
    difficulty: NORMAL
    pvp: true

scoreboard:
  enabled: true
  refresh-interval-seconds: 5
  title: "<gradient:#38bdf8:#818cf8><bold>CanvasSuite</bold></gradient>"
  # Rendered relationally per viewer. In addition to MiniPlaceholders tags (<player_name>,
  # <luckperms_prefix>, ...), a couple of other modules expose their own live per-viewer tags
  # here: the stats module (see the `stats` section below) - <stats_kills>, <stats_deaths>,
  # <stats_kd>, <stats_killstreak>, <stats_best_killstreak>, <stats_playtime> - the economy
  # module - <economy_balance> - and the guild module - <guild_own_name>, <guild_own_tag>
  # (both render to nothing for players not in a guild).
  lines:
    - "<gradient:#818cf8:#38bdf8><strikethrough>                         </strikethrough>"
    - " "
    - "<green><bold>$</bold><gray> Money: </gray><economy_balance></green>"
    - "<dark_red><bold>🗡</bold><gray> Kills: </gray><stats_kills></dark_red>"
    - "<#F54927><bold>☠</bold><gray> Deaths: </gray><stats_deaths></#F54927>"
    - "<yellow><bold>🕓</bold><gray> Playtime: </gray><stats_playtime></yellow>"
    - "<#818cf8><bold>⚑</bold><gray> Guild: </gray><guild_own_name></#818cf8>"
    - " "
    - "<gradient:#818cf8:#38bdf8><strikethrough>                         </strikethrough>"
    - "<white>  play.example.com  "

stats:
  # A server-wide broadcast is sent (stats.killstreak-broadcast in messages.yml) whenever a
  # player's current killstreak hits one of these numbers.
  killstreak-broadcast-milestones: [5, 10, 25, 50, 100]
  # Online players' playtime is flushed to storage this often, so a crash between one player's
  # deaths/kills (which persist immediately) doesn't lose much accrued playtime.
  playtime-autosave-interval-seconds: 60

hologram:
  # Requires the FancyHolograms plugin to be installed - /statshologram is disabled otherwise.
  # FancyHolograms owns the hologram entities themselves (location, persistence across restarts);
  # this only controls how often we push fresh leaderboard text into the ones /statshologram made.
  refresh-interval-seconds: 30