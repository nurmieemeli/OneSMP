# Backs /sell only. sell-price is what /sell pays per single item; remove an item from this list to make it unsellable.
#
# Pricing model: every survival-obtainable item in the game, priced by rarity/difficulty to obtain.
# Baseline anchor: NETHERITE_INGOT = 20000. Everything else is scaled relative to that anchor using
# real crafting/mining costs (ore rarity, mob-drop odds, structure loot rarity, recipe material cost).
#
# Deliberately omitted (not meaningfully priceable as a plain item, or not legitimately survival-obtainable):
#   - NBT/data-driven items: ENCHANTED_BOOK, WRITTEN_BOOK, FILLED_MAP, POTION, SPLASH_POTION,
#     LINGERING_POTION, TIPPED_ARROW, SUSPICIOUS_STEW (value lives in the NBT, not the material)
#   - Spawn eggs (not obtainable in vanilla survival)
#   - Creative/technical-only blocks: AIR variants, BARRIER, LIGHT, STRUCTURE_VOID/BLOCK, JIGSAW,
#     command blocks, BEDROCK, END_PORTAL/FRAME, END_GATEWAY, MOVING_PISTON, PISTON_HEAD, SPAWNER,
#     VAULT, TRIAL_SPAWNER, CREAKING_HEART, REINFORCED_DEEPSLATE, BUDDING_AMETHYST, INFESTED_* blocks,
#     PETRIFIED_OAK_SLAB, TEST_BLOCK(S), DEBUG_STICK, KNOWLEDGE_BOOK, MOJANG_BANNER_PATTERN
#   - Placement-state duplicates of an item that already exists in standalone form: all *_WALL_SIGN,
#     *_WALL_HANGING_SIGN, *_WALL_BANNER, *_WALL_HEAD/*_WALL_SKULL, *_WALL_TORCH, *_WALL_FAN,
#     CANDLE_CAKE variants, WATER_CAULDRON/LAVA_CAULDRON/POWDER_SNOW_CAULDRON, ATTACHED_*_STEM,
#     MELON_STEM/PUMPKIN_STEM, CARROTS/POTATOES/BEETROOTS/TORCHFLOWER_CROP/PITCHER_CROP/COCOA,
#     KELP_PLANT, *_VINES_PLANT, BIG_DRIPLEAF_STEM, TRIPWIRE, REDSTONE_WIRE
#   - Transient/uncollectable: FIRE, SOUL_FIRE, WATER, LAVA, BUBBLE_COLUMN, NETHER_PORTAL, FROSTED_ICE,
#     POWDER_SNOW (block form), SUSPICIOUS_SAND/GRAVEL, SWEET_BERRY_BUSH, POTTED_* (all flower pots
#     with a plant already potted are composite, not a single obtainable item)
